# DM420 station identity — interim config (format & persistence are TBD; see
# joels-notes.md). Copy this file to `dm420.toml` in the directory you launch
# DM420 from, then set your own values.
#
# There is NO built-in default: DM420 will not call CQ or answer until a callsign
# is set — here, via the DM420_CALLSIGN / DM420_GRID env vars, or typed into the
# unlocked top bar (GUI ▸ EDIT). Env vars take precedence over this file.

[station]
callsign = "YOURCALL"   # e.g. W4LL
grid     = "AA00"       # your Maidenhead grid, e.g. EM73
